<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a7d46">
<title>花博 下書きBOX</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<style>
  :root {
    --green: #0a7d46;
    --green-dark: #086238;
    --bg: #f4f7f5;
    --card: #ffffff;
    --text: #1f2a24;
    --muted: #6b7a72;
    --line: #e2e8e4;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
    background: var(--bg); color: var(--text);
    padding-bottom: env(safe-area-inset-bottom);
  }
  header {
    background: var(--green); color: #fff;
    padding: calc(env(safe-area-inset-top) + 12px) 16px 0;
    position: sticky; top: 0; z-index: 10;
  }
  .head-row { display: flex; align-items: center; justify-content: space-between; padding-bottom: 10px; }
  .head-row h1 { font-size: 17px; font-weight: 700; letter-spacing: .02em; }
  .head-btns { display: flex; gap: 6px; }
  .icon-btn {
    background: rgba(255,255,255,.16); border: none; color: #fff;
    width: 34px; height: 34px; border-radius: 10px; font-size: 16px; cursor: pointer;
  }
  .icon-btn:active { background: rgba(255,255,255,.3); }
  nav { display: flex; gap: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  nav::-webkit-scrollbar { display: none; }
  nav button {
    flex: none; background: transparent; border: none; color: rgba(255,255,255,.75);
    padding: 10px 12px 12px; font-size: 14px; font-weight: 600; cursor: pointer;
    border-bottom: 3px solid transparent; white-space: nowrap;
  }
  nav button.active { color: #fff; border-bottom-color: #ffd23f; }
  main { padding: 14px 14px 40px; max-width: 640px; margin: 0 auto; }
  .card {
    background: var(--card); border: 1px solid var(--line); border-radius: 14px;
    padding: 12px 14px; margin-bottom: 12px;
  }
  .card.done { opacity: .45; }
  .card-meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .badge {
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 999px;
    background: #e7f3ec; color: var(--green-dark);
  }
  .badge.done-badge { background: #eceff0; color: #7b8790; }
  .card-text { font-size: 14px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; }
  .card-actions { display: flex; gap: 8px; margin-top: 10px; }
  .btn {
    flex: 1; border: none; border-radius: 10px; padding: 10px 0;
    font-size: 13px; font-weight: 700; cursor: pointer;
  }
  .btn-copy { background: var(--green); color: #fff; }
  .btn-copy:active { background: var(--green-dark); }
  .btn-mark { background: #eef2ef; color: var(--text); }
  .btn-mark:active { background: #dfe6e1; }
  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 48px 0; line-height: 1.8; }
  .toast {
    position: fixed; left: 50%; bottom: 32px; transform: translateX(-50%) translateY(20px);
    background: #222; color: #fff; font-size: 13px; padding: 10px 18px; border-radius: 999px;
    opacity: 0; transition: all .25s; pointer-events: none; z-index: 50; white-space: nowrap;
  }
  .toast.show { opacity: .95; transform: translateX(-50%) translateY(0); }
  /* 設定画面 */
  .settings { max-width: 480px; margin: 0 auto; padding: 28px 20px; }
  .settings h2 { font-size: 18px; margin-bottom: 6px; }
  .settings p { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
  .settings label { display: block; font-size: 13px; font-weight: 700; margin: 14px 0 6px; }
  .settings input {
    width: 100%; padding: 12px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 14px; background: #fff;
  }
  .settings .btn { width: 100%; margin-top: 22px; padding: 13px 0; font-size: 15px; }
  .hidden { display: none; }
  .loading { text-align: center; padding: 48px 0; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>

<header id="header" class="hidden">
  <div class="head-row">
    <h1>🌸 花博 下書きBOX</h1>
    <div class="head-btns">
      <button class="icon-btn" id="refreshBtn" title="更新">↻</button>
      <button class="icon-btn" id="settingsBtn" title="接続設定">⚙</button>
    </div>
  </div>
  <nav id="tabs"></nav>
</header>

<main id="list" class="hidden"></main>

<div id="settingsView" class="settings hidden">
  <h2>接続設定</h2>
  <p>保管先（GAS）のURLとキーを入力してね。この端末のみに保存されます（値はVPSの .env から転記）。</p>
  <label for="gasUrl">GAS URL</label>
  <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
  <label for="gasKey">API キー</label>
  <input type="password" id="gasKey" placeholder="HANAHAKU_STORE_GAS_KEY の値" autocomplete="off">
  <button class="btn btn-copy" id="saveSettings">保存して開く</button>
</div>

<div class="toast" id="toast"></div>

<script>
// タブ設定（keyはスプシのタブ名と一致させる）。花博専用（USJは別アプリ usj-drafts）
const TABS = [
  { key: 'X', label: 'X' },
  { key: 'ストーリーズ', label: 'ストーリーズ' },
  { key: 'オープンチャット', label: 'オプチャ' },
];
const CONFIG_KEY = 'hanahaku-drafts-config';

let config = null;
let currentTab = TABS[0].key;
let cache = {};  // tab名 → 行配列

const $ = (id) => document.getElementById(id);

// XSS対策: 表示は全てDOM構築＋textContentで行う（innerHTMLに外部データを渡さない）
function el(tag, className, text) {
  const e = document.createElement(tag);
  if (className) e.className = className;
  if (text !== undefined) e.textContent = text;
  return e;
}

function loadConfig() {
  try { config = JSON.parse(localStorage.getItem(CONFIG_KEY)); } catch { config = null; }
  return config && config.url && config.key;
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

function showSettings() {
  $('header').classList.add('hidden');
  $('list').classList.add('hidden');
  $('settingsView').classList.remove('hidden');
  if (config) { $('gasUrl').value = config.url || ''; $('gasKey').value = config.key || ''; }
}

function showApp() {
  $('settingsView').classList.add('hidden');
  $('header').classList.remove('hidden');
  $('list').classList.remove('hidden');
}

function renderTabs() {
  const nav = $('tabs');
  nav.replaceChildren();
  TABS.forEach((t) => {
    const b = el('button', t.key === currentTab ? 'active' : '', t.label);
    b.onclick = () => { currentTab = t.key; renderTabs(); renderList(); };
    nav.appendChild(b);
  });
}

function fmtDate(iso) {
  const d = new Date(iso);
  if (isNaN(d)) return String(iso || '');
  const p = (n) => String(n).padStart(2, '0');
  return `${d.getMonth() + 1}/${d.getDate()} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function renderMessage(text) {
  const list = $('list');
  list.replaceChildren(el('div', 'empty', text));
}

async function fetchAll() {
  const list = $('list');
  list.replaceChildren(el('div', 'loading', '読み込み中…'));
  try {
    const res = await fetch(`${config.url}?apiKey=${encodeURIComponent(config.key)}`);
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'エラー');
    cache = json.data || {};
    renderList();
  } catch (err) {
    renderMessage(`読み込みに失敗しました（${err.message}）\n接続設定を確認してね`);
  }
}

function renderList() {
  const rows = cache[currentTab] || [];
  const list = $('list');
  if (!rows.length) {
    renderMessage('まだ下書きがないよ');
    return;
  }
  list.replaceChildren();
  rows.forEach((r) => {
    const done = r.status === '投稿済み';
    const card = el('div', 'card' + (done ? ' done' : ''));
    const meta = el('div', 'card-meta');
    meta.appendChild(el('span', '', fmtDate(r.datetime)));
    if (r.source) meta.appendChild(el('span', 'badge', String(r.source)));
    if (done) meta.appendChild(el('span', 'badge done-badge', '✅ 投稿済み'));
    const text = el('div', 'card-text', String(r.text || ''));
    const actions = el('div', 'card-actions');
    const copyBtn = el('button', 'btn btn-copy', '📋 コピー');
    copyBtn.onclick = () => copyText(String(r.text || ''));
    actions.appendChild(copyBtn);
    if (!done) {
      const markBtn = el('button', 'btn btn-mark', '✅ 投稿済みにする');
      markBtn.onclick = () => markPosted(r, markBtn);
      actions.appendChild(markBtn);
    }
    card.appendChild(meta);
    card.appendChild(text);
    card.appendChild(actions);
    list.appendChild(card);
  });
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
    showToast('コピーしました');
  } catch {
    // フォールバック（旧ブラウザ用）
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showToast('コピーしました');
  }
}

async function markPosted(row, btn) {
  btn.disabled = true;
  btn.textContent = '更新中…';
  try {
    // GASはapplication/jsonだとCORSプリフライトで落ちるため text/plain で送る（GAS側はcontentsをJSON.parse）
    const res = await fetch(config.url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ apiKey: config.key, action: 'mark', tab: currentTab, row: row.row }),
    });
    const json = await res.json();
    if (!json.success) throw new Error(json.error || 'エラー');
    row.status = '投稿済み';
    renderList();
    showToast('投稿済みにしました');
  } catch (err) {
    btn.disabled = false;
    btn.textContent = '✅ 投稿済みにする';
    showToast(`失敗: ${err.message}`);
  }
}

$('saveSettings').onclick = () => {
  const url = $('gasUrl').value.trim();
  const key = $('gasKey').value.trim();
  if (!url || !key) { showToast('URLとキーを入力してね'); return; }
  config = { url, key };
  localStorage.setItem(CONFIG_KEY, JSON.stringify(config));
  showApp();
  renderTabs();
  fetchAll();
};
$('settingsBtn').onclick = showSettings;
$('refreshBtn').onclick = fetchAll;

// 起動
if (loadConfig()) {
  showApp();
  renderTabs();
  fetchAll();
} else {
  showSettings();
}

// PWA: Service Worker登録（静的アセットのみキャッシュ）
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
